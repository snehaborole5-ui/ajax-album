<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> AJAX Albums CRUD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>

        #spinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.7);
            z-index: 9999;
        }
        #spinner.d-none{
            display: none !important;
        }
    </style>
</head>
<body class="bg-light">

    

    <div class="container mt-5">
        <div class="row mb-5 justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="text-center mb-4">Manage Albums</h2>
                        <form id="albumForm" novalidate>
                            
                            <div class="form-group">
                                <label for="albumTitle" class="font-weight-bold">Album Title*</label>
                                <input type="text" class="form-control" id="albumTitle" placeholder="Enter album title">
                            </div>

                            <div class="form-group">
                                <label for="userId" class="font-weight-bold">User Id*</label>
                                <select class="form-control" id="userId">
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                    <option value="6">6</option>
                                    <option value="7">7</option>
                                    <option value="8">8</option>
                                    <option value="9">9</option>
                                    <option value="10">10</option>
                                </select>
                            </div>

                            <div class="mt-4">
                                <button type="submit" id="addAlbumBtn" class="btn btn-primary btn-block">Add Album</button>
                                <button type="button" id="updateAlbumBtn" class="btn btn-info text-white btn-block d-none">Update Album</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="mb-4">All Albums</h3>
        <hr>
        <div class="row" id="albumContainer">
            </div>
    </div>

    <div id="spinner" class="d-flex justify-content-center align-items-center d-none">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
